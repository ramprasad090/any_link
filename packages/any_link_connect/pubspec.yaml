name: any_link_connect
description: "Two-layer connectivity monitor for Flutter. Detects captive portals, measures connection quality, queues offline requests. Fixes connectivity_plus#3440."
version: 1.0.0
homepage: https://github.com/ramprasad090/any_link
repository: https://github.com/ramprasad090/any_link
issue_tracker: https://github.com/ramprasad090/any_link/issues

topics:
  - connectivity
  - offline
  - network
  - captive-portal
  - sync

platforms:
  android:
  ios:
  web:
  macos:
  windows:
  linux:

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  any_link: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
