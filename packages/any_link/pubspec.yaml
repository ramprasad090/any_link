name: any_link
description: "Zero-dependency Flutter HTTP client. Replaces dio, http, connectivity_plus, cached_network_image. Built on dart:io directly. Auth, retry, pagination, batching, logging, and 80+ features."
version: 1.2.1
homepage: https://github.com/ramprasad090/any_link
repository: https://github.com/ramprasad090/any_link
issue_tracker: https://github.com/ramprasad090/any_link/issues

topics:
  - http
  - networking
  - dio
  - rest
  - api

platforms:
  android:
  ios:
  web:
  macos:
  windows:
  linux:

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
