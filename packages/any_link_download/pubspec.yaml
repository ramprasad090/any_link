name: any_link_download
description: "Download manager for any_link. Resumable, parallel-chunk, background-capable downloads with real progress. Zero extra dependencies."
version: 1.0.0
homepage: https://github.com/ramprasad090/any_link
repository: https://github.com/ramprasad090/any_link
issue_tracker: https://github.com/ramprasad090/any_link/issues

topics:
  - download
  - file-download
  - resumable
  - progress
  - http

platforms:
  android:
  ios:
  web:
  macos:
  windows:
  linux:

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  any_link: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
